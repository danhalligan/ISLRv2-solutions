name: Build and Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-22.04
    env:
      # Tell renv to fetch pre-built Linux binaries from Posit Public Package
      # Manager instead of the source repos recorded in the lockfile. PPM
      # serves the exact pinned versions and avoids compiling from source
      # (which would require us to also install -dev system libraries).
      RENV_CONFIG_REPOS_OVERRIDE: https://packagemanager.posit.co/cran/__linux__/jammy/latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libcairo2-dev

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Cache bookdown output
        uses: actions/cache@v4
        with:
          path: |
            _bookdown_files
            islrv2-solutions.rds
          key: bookdown-${{ runner.os }}-${{ hashFiles('*.Rmd') }}
          restore-keys: |
            bookdown-${{ runner.os }}-

      - name: Setup keras
        run: Rscript -e "keras::install_keras()"

      - name: Build 🔧
        run: Rscript -e "bookdown::render_book('index.Rmd', 'bookdown::gitbook')"

      - name: Deploy 🚀
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _book
